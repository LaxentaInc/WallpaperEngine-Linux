name: Rust
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  CARGO_TERM_COLOR: always
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src-tauri
    steps:
    - uses: actions/checkout@v4

    - name: Install system deps
      run: sudo apt-get update && sudo apt-get install -y libwayland-dev libegl1-mesa-dev libxkbcommon-dev libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libglib2.0-dev

    - name: Cache cargo
      uses: Swatinem/rust-cache@v2

    - name: Check formatting
      run: cargo fmt --check
      continue-on-error: true

    - name: Clippy
      run: cargo clippy --all-targets --all-features -- -D warnings
      continue-on-error: true

    - name: Build
      run: cargo build --verbose

    - name: Run tests
      run: cargo test --verbose
