name: Summarize new issues

on:
  issues:
    types: [opened]

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      models: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract search keywords
        id: keywords
        uses: actions/ai-inference@v1
        with:
          prompt: |
            You are a codebase search assistant. Analyze the issue title and body below and extract a list of keywords to grep the codebase for context.
            CRITICAL: You must extract at least 2 keywords (up to 8). If the issue mentions a specific term (e.g., 'libmpv'), do not just output that one term. Also include related architectural terms, synonyms, or nested concepts that might provide better context.
            Output ONLY a newline-separated list of raw keywords/phrases (one per line) without quotes, bullets, or extra text. If no keyword is applicable, output "None".
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

      - name: Search codebase
        id: search
        run: |
          KEYWORDS="${{ steps.keywords.outputs.response }}"
          > search_results.txt
          
          printf "%s\n" "$KEYWORDS" | tr -d '\r' | while IFS= read -r RAW_KEYWORD; do
            KEYWORD=$(echo "$RAW_KEYWORD" | xargs)
            if [ "$KEYWORD" != "None" ] && [ -n "$KEYWORD" ]; then
              echo "--- search results for: $KEYWORD ---" >> search_results.txt
              # targets only actual source code and the critical error log, excluding noisy root markdowns. increased context cap to 60 lines (approx 12 blocks) per keyword to feed the ai more code without breaching the 8k token ceiling.
              MATCHES=$(git grep -i -n -C 2 -e "$KEYWORD" -- "*.rs" "*.ts" "*.tsx" "*.js" "*.css" "*.toml" "*.json" "docs/research/error_log_and_fixes.md" 2>/dev/null | head -n 60 | cut -c 1-120 || true)
              if [ -n "$MATCHES" ]; then
                echo "$MATCHES" >> search_results.txt
              else
                echo "no matches found." >> search_results.txt
              fi
              echo "" >> search_results.txt
            fi
          done
          
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "results<<$EOF" >> "$GITHUB_OUTPUT"
          cat search_results.txt >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Run final AI inference
        id: inference
        uses: actions/ai-inference@v2
        with:
          model: 'openai/gpt-4o'
          max-completion-tokens: 2000
          prompt: |
            You are reviewing a new issue to facilitate the devs to find the related code quickly, do nothing extraordinary. Keep.
            
            Follow:
            [Emoji] [One short polite greeting sentence to the user who opened the issue]
            **Severity**: [Low/Medium/High/Critical] | **Type**: [Bug/Feature/Question]
            
            **Summary**: [1 sentence summary]
            
            **Relevant Locations, quick points so the dev can find it, don't need to explain anything**:
            CRITICAL INSTRUCTION: You MUST format EVERY single location as a clickable markdown link using this EXACT syntax: `[filepath:line](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/filepath#Lline)`. If you output raw text like `file.rs:10`, you have failed.
            - List all matches. Do not include verbose descriptions. Keep it dense.
            
            Code Search Results given by system:
            ```
            ${{ steps.search.outputs.results }}
            ```
            
            Title: ${{ github.event.issue.title }}
            Body: ${{ github.event.issue.body }}

      - name: Comment with AI summary
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$RESPONSE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RESPONSE: ${{ steps.inference.outputs.response }}
